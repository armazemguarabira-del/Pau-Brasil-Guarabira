<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pau Brasil Distribuidora</title>
    <script>
      // Prevent blank page on GitHub Pages / directory subfolders when trailing slash is missing
      if (window.location.pathname && !window.location.pathname.endsWith('/') && !window.location.pathname.split('/').pop().includes('.')) {
        window.location.replace(window.location.href + '/');
      }
    </script>
    <link rel="icon" type="image/png" href="./favicon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
